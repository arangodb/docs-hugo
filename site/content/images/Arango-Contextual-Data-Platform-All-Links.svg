     xmlns:xlink="http://www.w3.org/1999/xlink"
     style="display:block;width:100%;max-width:1100px;margin:0 auto">
  <style>
    .cdp-all .card-link { cursor: pointer; }
    .cdp-all .card-link rect.node { transition: fill 120ms, stroke 120ms; }
    .cdp-all .card-link:hover rect.node { fill: #dcfce7; stroke: #22c55e; }
    .cdp-all .card-link:hover rect.suite-node { fill: #1f5c38; stroke: #4ade80; }
    .cdp-all .card-link:hover rect.suite-node-hl { fill: #174d2e; stroke: #4ade80; }
    .cdp-all .card-link:hover rect.connector { fill: #22c55e; stroke: #166534; }
  </style>
  <defs>
    <marker id="cdp-arr" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="userSpaceOnUse">
