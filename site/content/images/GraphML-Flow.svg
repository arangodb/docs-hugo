<svg viewBox="0 0 1380 360"
     xmlns="http://www.w3.org/2000/svg"
     style="display:block;width:100%;max-width:1380px;margin:0 auto">
  <style>
    .gml .pill-aai { fill: #b9f5a0; stroke: #4ade80; stroke-width: 1.5; }
    .gml .pill-ps  { fill: #ffffff; stroke: #86efac; stroke-width: 1.5; }
    .gml .cyl-db   { fill: #0b2e1e; stroke: #22c55e; stroke-width: 2; }
    .gml .cyl-db-top { fill: #134d2e; stroke: #22c55e; stroke-width: 2; }
    .gml .card:hover .pill-aai     { fill: #ffffff; stroke: #22c55e; }
    .gml .card:hover .pill-ps      { fill: #dcfce7; stroke: #22c55e; }
    .gml .card:hover .cyl-db       { fill: #134d2e; stroke: #b9ff38; }
    .gml .card:hover .cyl-db-top   { fill: #1a5e38; stroke: #b9ff38; }
  </style>
  <defs>
    <filter id="gml-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="gml-arrow" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,10 4,0 8" fill="#4ade80"/>
    </marker>
  </defs>

  <g class="gml">
    <rect width="1380" height="360" fill="#f3f4f6" rx="6"/>

    <g class="card">
      <rect x="30" y="70" width="180" height="100" rx="14" class="pill-ps"/>
      <text x="120" y="110" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#14532d">User</text>
      <text x="120" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#14532d">picks graph + task</text>
    </g>

    <path d="M 210 120 L 258 120" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#gml-arrow)"/>
    <rect x="216" y="98" width="38" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
    <text x="235" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">select</text>

    <g class="card">
      <rect x="260" y="70" width="200" height="100" rx="14" class="pill-aai" filter="url(#gml-glow)"/>
      <text x="360" y="105" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0b2e1e">Prepare</text>
      <text x="360" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#0b2e1e">turn graph data into</text>
      <text x="360" y="143" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#0b2e1e">AI-ready format</text>
    </g>

    <path d="M 460 120 L 538 120" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#gml-arrow)"/>

    <g class="card">
      <rect x="540" y="70" width="200" height="100" rx="14" class="pill-aai" filter="url(#gml-glow)"/>
      <text x="640" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0b2e1e">Train</text>
      <text x="640" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#0b2e1e">learn from your graph</text>
    </g>

    <path d="M 740 120 L 818 120" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#gml-arrow)"/>

    <g class="card">
      <rect x="820" y="70" width="220" height="100" rx="14" class="pill-aai" filter="url(#gml-glow)"/>
      <text x="930" y="105" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0b2e1e">Predict</text>
      <text x="930" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#0b2e1e">classify nodes, find</text>
      <text x="930" y="143" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#0b2e1e">similar items</text>
    </g>

    <path d="M 1040 120 L 1153 120" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#gml-arrow)"/>
    <rect x="1058" y="98" width="68" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
    <text x="1092" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">saved back</text>

    <g class="card">
      <path d="M 1155 87 L 1155 152 A 75 16 0 0 0 1305 152 L 1305 87" class="cyl-db"/>
      <ellipse cx="1230" cy="87" rx="75" ry="16" class="cyl-db-top"/>
      <text x="1230" y="122" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff">ArangoDB</text>
      <text x="1230" y="142" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#b9ff38">your graph data</text>
    </g>

    <path d="M 930 170 L 930 230 L 120 230 L 120 170" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#gml-arrow)"/>
    <rect x="475" y="222" width="100" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
    <text x="525" y="234" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">labels + insights</text>

    <path d="M 1230 168 L 1230 300 L 360 300 L 360 170" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#gml-arrow)"/>
  </g>
</svg>
