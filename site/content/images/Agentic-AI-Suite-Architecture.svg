<svg viewBox="-25 0 825 720"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     style="display:block;width:100%;max-width:800px;margin:0 auto">
  <style>
    .agentic-arch .card-link { cursor: pointer; }
    .agentic-arch .card-link:hover .suite-node    { fill: #1f5c38; stroke: #4ade80; }
    .agentic-arch .card-link:hover .suite-node-hl { fill: #174d2e; stroke: #4ade80; }
    .agentic-arch .card-link:hover .right-node    { fill: #d1fae5; stroke: #4ade80; }
  </style>
  <defs>
    <marker id="agentic-arr-g" markerWidth="14" markerHeight="10" refX="14" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,14 5,0 10" fill="#22c55e"/>
    </marker>
    <marker id="agentic-arr-gr" markerWidth="14" markerHeight="10" refX="14" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,14 5,0 10" fill="#9ca3af"/>
    </marker>
    <filter id="agentic-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="agentic-glow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g class="agentic-arch">
    <rect width="800" height="720" fill="#f3f4f6" rx="4"/>

    <rect x="115" y="15" width="170" height="58" rx="8" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="200" y="40" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">Unstructured</text>
    <text x="200" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">Data Sources</text>

    <rect x="315" y="15" width="170" height="58" rx="8" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">Semi-structured</text>
    <text x="400" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">Data Sources</text>

    <rect x="515" y="15" width="170" height="58" rx="8" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="600" y="40" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">Structured</text>
    <text x="600" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">Data Sources</text>

    <path d="M 200,73 C 200,100 400,100 400,110" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#agentic-arr-gr)"/>
    <path d="M 400,73 L 400,110"                  stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#agentic-arr-gr)"/>
    <path d="M 600,73 C 600,100 400,100 400,110"  stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#agentic-arr-gr)"/>

    <a class="card-link" xlink:href="/agentic-ai-suite/autograph/">
