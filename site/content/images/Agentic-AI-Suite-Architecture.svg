    <rect x="10" y="216" width="780" height="16"  fill="#134d2e"/>
    <text x="400" y="221" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Arango Agentic AI Suite</text>

