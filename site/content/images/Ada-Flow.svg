<svg viewBox="0 0 1080 290"
     xmlns="http://www.w3.org/2000/svg"
     style="display:block;width:100%;max-width:1080px;margin:0 auto">
  <style>
    .ada .pill-aai { fill: #b9f5a0; stroke: #4ade80; stroke-width: 1.5; }
    .ada .pill-ps  { fill: #ffffff; stroke: #86efac; stroke-width: 1.5; }
    .ada .cyl-db   { fill: #0b2e1e; stroke: #22c55e; stroke-width: 2; }
    .ada .cyl-db-top { fill: #134d2e; stroke: #22c55e; stroke-width: 2; }
    .ada .cyl-llm  { fill: #e5e7eb; stroke: #9ca3af; stroke-width: 1.5; }
    .ada .cyl-llm-top { fill: #f3f4f6; stroke: #9ca3af; stroke-width: 1.5; }
    .ada .card:hover .pill-aai     { fill: #ffffff; stroke: #22c55e; }
    .ada .card:hover .pill-ps      { fill: #dcfce7; stroke: #22c55e; }
    .ada .card:hover .cyl-db       { fill: #134d2e; stroke: #b9ff38; }
    .ada .card:hover .cyl-db-top   { fill: #1a5e38; stroke: #b9ff38; }
    .ada .card:hover .cyl-llm      { fill: #b9ff38; stroke: #22c55e; }
    .ada .card:hover .cyl-llm-top  { fill: #dcfce7; stroke: #22c55e; }
  </style>
  <defs>
    <filter id="ada-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ada-arrow" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,10 4,0 8" fill="#4ade80"/>
    </marker>
  </defs>

  <g class="ada">
    <rect width="1080" height="290" fill="#f3f4f6" rx="6"/>

    <g class="card">
      <rect x="30" y="120" width="180" height="100" rx="14" class="pill-ps"/>
      <text x="120" y="160" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#14532d">User</text>
      <text x="120" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#14532d">asks in plain English</text>
    </g>

    <g class="card">
      <rect x="290" y="10" width="200" height="100" rx="14" class="pill-aai" filter="url(#ada-glow)"/>
      <text x="390" y="50" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0b2e1e">Ada UI</text>
      <text x="390" y="75" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#0b2e1e">chat in your browser</text>
    </g>

    <g class="card">
      <rect x="550" y="120" width="210" height="100" rx="14" class="pill-aai" filter="url(#ada-glow)"/>
      <text x="655" y="160" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0b2e1e">Ada Engine</text>
      <text x="655" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#0b2e1e">plans + uses tools</text>
    </g>

    <g class="card">
      <path d="M 870 26 L 870 90 A 70 14 0 0 0 1010 90 L 1010 26" class="cyl-db"/>
      <ellipse cx="940" cy="26" rx="70" ry="14" class="cyl-db-top"/>
      <text x="940" y="60" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff">ArangoDB</text>
      <text x="940" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#b9ff38">your data</text>
    </g>

    <g class="card">
      <path d="M 870 136 L 870 200 A 70 14 0 0 0 1010 200 L 1010 136" class="cyl-llm"/>
      <ellipse cx="940" cy="136" rx="70" ry="14" class="cyl-llm-top"/>
      <text x="940" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111827">LLM provider</text>
    </g>

    <path d="M 175 120 L 175 60 L 288 60" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#ada-arrow)"/>
    <rect x="200" y="42" width="46" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
    <text x="223" y="54" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">question</text>

    <path d="M 490 60 L 615 60 L 615 120" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#ada-arrow)"/>

    <path d="M 548 170 L 213 170" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#ada-arrow)"/>
    <rect x="335" y="158" width="80" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
    <text x="375" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">reply + chart</text>

    <path d="M 720 120 L 720 60 L 868 60" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#ada-arrow)"/>
    <rect x="745" y="42" width="110" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
    <text x="800" y="54" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">reads schema + data</text>

    <path d="M 760 162 L 868 162" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#ada-arrow)"/>
    <rect x="785" y="146" width="48" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
    <text x="809" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">prompt</text>

    <path d="M 868 188 L 762 188" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#ada-arrow)"/>
    <rect x="785" y="194" width="48" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
    <text x="809" y="206" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">answer</text>
  </g>
</svg>
