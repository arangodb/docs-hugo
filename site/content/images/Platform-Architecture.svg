      <text x="450" y="174" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a2e05">Envoy</text>
      <text x="450" y="192" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3f6212">(API Gateway &amp;</text>
      <text x="450" y="206" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3f6212">HTTP Frontend)</text>
