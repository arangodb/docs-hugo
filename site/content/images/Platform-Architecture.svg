      <text x="690" y="198" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#9a3412">Service A</text>
      <text x="690" y="216" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#c2410c">Bring Your Own Code</text>
