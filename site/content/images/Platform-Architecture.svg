    <text x="745" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#9a3412">USER-DEFINED SERVICES (BYOC)</text>

    <a class="card-link" xlink:href="/platform-suite/container-manager/">
