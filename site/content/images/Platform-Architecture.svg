    <a class="card-link" xlink:href="/agentic-ai-suite/retriever/">
      <rect x="675" y="460" width="180" height="60" rx="8" class="node-ai" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="765" y="485" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#3b0764">AutoGraph</text>
      <text x="765" y="501" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#3b0764">Retriever</text>
