<svg viewBox="0 0 900 600"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     style="display:block;width:100%;max-width:900px;margin:0 auto">
  <style>
    .arch .card-link { cursor: pointer; }
    .arch .card-link .node { transition: fill 120ms, stroke 120ms; }
    .arch .card-link:hover .node    { fill: #dcfce7; stroke: #16a34a; }
    .arch .card-link:hover .node-db { fill: #bbf7d0; stroke: #16a34a; }
    .arch .card-link:hover .node-ai { fill: #f3e8ff; stroke: #7c3aed; }
    .arch .card-link:hover .node-byoc { fill: #fed7aa; stroke: #ea580c; }
    .arch .card-link:hover .node-op { fill: #d1fae5; stroke: #16a34a; }
  </style>
  <defs>
    <marker id="arrow-g" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,10 4,0 8" fill="#6b7280"/>
    </marker>
    <marker id="arrow-g-start" markerWidth="10" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="10 0,0 4,10 8" fill="#6b7280"/>
    </marker>
  </defs>

  <g class="arch">
    <rect width="900" height="600" fill="#f8fafc" rx="6"/>

    <g>
      <circle cx="450" cy="40" r="18" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
      <circle cx="450" cy="35" r="5" fill="#6b7280"/>
      <path d="M 442 56 A 8 16 0 0 1 458 56 Z" fill="#6b7280"/>
      <text x="450" y="82" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">USER</text>
