      <rect x="750" y="162" width="110" height="65" rx="8" class="node-byoc" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/>
      <text x="805" y="184" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#9a3412">BYOC</text>
      <text x="805" y="198" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#9a3412">Service B</text>
