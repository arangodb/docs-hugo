    <path d="M 160 450 L 200 450" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrow-g)" marker-start="url(#arrow-g-start)"/>
    <text x="180" y="444" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">Manages</text>

    <path d="M 160 485 L 200 485" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrow-g)"/>
    <text x="180" y="479" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#6b7280">Configuration</text>

    <path d="M 160 520 L 200 520" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrow-g)"/>
    <text x="180" y="507" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#6b7280">Query/Data</text>
    <text x="180" y="514" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#6b7280">access</text>

    <path d="M 95 420 L 95 181 L 340 181" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrow-g)"/>

    <path d="M 360 217 L 360 240 L 310 240 L 310 313" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>
    <path d="M 512 217 L 512 313" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>

    <path d="M 540 217 L 540 245 L 630 245 L 630 388 L 550 388 L 550 405" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>

    <path d="M 310 370 L 310 405" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>
    <path d="M 528 370 L 528 405" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>

    <path d="M 795 255 L 795 229" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>
    <path d="M 815 227 L 815 253" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>

    <path d="M 620 410 L 647 410 L 647 325 L 675 325" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>
    <text x="652" y="372" font-family="sans-serif" font-size="9" fill="#6b7280">Query/Data access</text>

    <path d="M 675 420 L 620 420" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>

    <path d="M 620 490 L 675 490" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>
