    <text x="35" y="129" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1e40af">KUBERNETES CLUSTER (k8s)</text>

    <path d="M 450 90 L 450 145" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arrow-g)"/>
    <text x="458" y="125" font-family="sans-serif" font-size="10" fill="#6b7280">HTTP/HTTPS (ingress)</text>

    <a class="card-link" xlink:href="https://www.envoyproxy.io/" target="_blank">
