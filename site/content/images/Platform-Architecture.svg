    <path d="M 405 565 L 405 545" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>
    <path d="M 535 565 L 535 545" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-g)"/>

