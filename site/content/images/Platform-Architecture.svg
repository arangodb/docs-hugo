      <text x="95" y="471" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0b2e1e">ArangoDB</text>
      <text x="95" y="487" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0b2e1e">Operator</text>
